<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>SWING AI - ゴルフスイング解析</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'swing-dark': '#0f1729',
            'swing-darker': '#080d1a',
            'swing-card': '#1a2340',
            'swing-border': '#2a3a5c',
            'swing-green': '#22c55e',
            'swing-green-dark': '#16a34a',
            'swing-accent': '#4ade80',
          },
          fontFamily: {
            display: ['Noto Sans JP', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #0f1729;
      color: #e2e8f0;
      margin: 0;
      min-height: 100vh;
    }
    .upload-zone {
      border: 2px dashed #2a3a5c;
      transition: all 0.3s ease;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #22c55e;
      background: rgba(34, 197, 94, 0.05);
    }
    .btn-analyze {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      transition: all 0.2s ease;
    }
    .btn-analyze:hover:not(:disabled) {
      transform: scale(0.98);
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
    }
    .btn-analyze:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .progress-bar {
      background: linear-gradient(90deg, #22c55e, #4ade80);
      transition: width 0.5s ease;
    }
    .score-circle {
      background: conic-gradient(
        #22c55e calc(var(--score) * 1%),
        #1a2340 0
      );
    }
    .fade-in {
      animation: fadeIn 0.5s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .pulse-loading {
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    /* スクロールバー */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f1729; }
    ::-webkit-scrollbar-thumb { background: #2a3a5c; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="app" class="min-h-screen flex flex-col">
    <!-- ヘッダー -->
    <header class="px-4 py-3 flex items-center gap-2 border-b border-swing-border/30">
      <span class="text-2xl">⛳</span>
      <div>
        <h1 class="text-lg font-bold text-white leading-tight">SWING AI</h1>
        <p class="text-xs text-gray-400">Golf Swing Analyzer</p>
      </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex-1 flex flex-col items-center px-4 py-8 max-w-2xl mx-auto w-full">
      
      <!-- ヒーローセクション -->
      <section id="hero-section" class="text-center mb-8">
        <h2 class="text-3xl md:text-4xl font-black text-white leading-tight mb-1">
          あなたのスイングを<br/>
          <span class="text-swing-green">AIが解析します</span>
        </h2>
        <p class="text-gray-400 text-sm mt-3">
          動画または画像をアップロードするだけで<br/>
          骨格・軌道を可視化してアドバイス
        </p>
        <p class="text-swing-accent text-xs mt-2 font-medium">
          ✨ 完全無料・登録不要・逆光でもOK
        </p>
      </section>

      <!-- アップロードゾーン -->
      <section id="upload-section" class="w-full mb-4">
        <label id="upload-zone" class="upload-zone block rounded-xl p-8 text-center cursor-pointer">
          <input type="file" id="file-input" accept="video/mp4,video/quicktime,image/jpeg,image/png" class="hidden" />
          <div id="upload-placeholder">
            <svg class="mx-auto mb-3 w-10 h-10 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
            <p class="text-gray-300 font-medium text-sm">タップして動画・画像を選択</p>
            <p class="text-gray-500 text-xs mt-1">逆光・暗い環境でも解析できます</p>
            <span class="inline-block mt-3 px-3 py-1 rounded-full border border-swing-border text-xs text-gray-400">
              MP4 / MOV / JPG / PNG 対応
            </span>
          </div>
        </label>
      </section>

      <!-- ファイルプレビュー -->
      <section id="preview-section" class="w-full mb-4 hidden">
        <div class="bg-swing-card rounded-xl overflow-hidden border border-swing-border">
          <div id="video-preview-container" class="hidden">
            <video id="video-preview" class="w-full max-h-64 object-contain bg-black" controls></video>
          </div>
          <div id="image-preview-container" class="hidden">
            <img id="image-preview" class="w-full max-h-64 object-contain bg-black" />
          </div>
          <div class="flex items-center justify-between px-4 py-2 border-t border-swing-border/50">
            <span id="file-name" class="text-sm text-gray-300 truncate"></span>
            <button id="remove-btn" class="text-red-400 hover:text-red-300 text-xs font-medium px-2 py-1 rounded hover:bg-red-400/10 transition">
              ✕ 削除
            </button>
          </div>
        </div>
      </section>

      <!-- 解析ボタン -->
      <button id="analyze-btn" class="btn-analyze w-full py-4 rounded-xl text-white font-bold text-base disabled:opacity-50" disabled>
        🏌️ スイングを解析する
      </button>

      <!-- プログレスバー -->
      <section id="progress-section" class="w-full mt-4 hidden">
        <div class="bg-swing-card rounded-xl p-4 border border-swing-border">
          <div class="flex items-center justify-between mb-2">
            <span id="progress-text" class="text-sm text-gray-300 pulse-loading">解析中...</span>
            <span id="progress-percent" class="text-sm text-swing-green font-medium">0%</span>
          </div>
          <div class="w-full h-2 bg-swing-darker rounded-full overflow-hidden">
            <div id="progress-bar" class="progress-bar h-full rounded-full" style="width: 0%"></div>
          </div>
          <p class="text-xs text-gray-500 mt-2">AIがスイングを分析しています。しばらくお待ちください...</p>
        </div>
      </section>

      <!-- 解析結果 -->
      <section id="result-section" class="w-full mt-6 hidden">
        
        <!-- 解析済み動画 -->
        <div id="analyzed-video-section" class="mb-6 hidden fade-in">
          <h3 class="text-lg font-bold text-white mb-3 flex items-center gap-2">
            <span class="text-swing-green">🎬</span> 解析済み動画
          </h3>
          <div class="bg-swing-card rounded-xl overflow-hidden border border-swing-border">
            <video id="analyzed-video" class="w-full" controls></video>
          </div>
        </div>

        <!-- スコア -->
        <div id="score-section" class="mb-6 fade-in">
          <div class="bg-swing-card rounded-xl p-6 border border-swing-border text-center">
            <h3 class="text-lg font-bold text-white mb-4">スイングスコア</h3>
            <div class="relative w-32 h-32 mx-auto mb-4">
              <div class="score-circle w-full h-full rounded-full flex items-center justify-center" style="--score: 0">
                <div class="w-24 h-24 bg-swing-dark rounded-full flex items-center justify-center">
                  <span id="score-value" class="text-3xl font-black text-white">--</span>
                </div>
              </div>
            </div>
            <p id="score-label" class="text-gray-400 text-sm">解析結果を待っています</p>
          </div>
        </div>

        <!-- サマリー -->
        <div id="summary-section" class="mb-6 hidden fade-in">
          <div class="bg-swing-card rounded-xl p-5 border border-swing-border">
            <h3 class="text-base font-bold text-white mb-2 flex items-center gap-2">
              <span>📋</span> 総合評価
            </h3>
            <p id="summary-text" class="text-gray-300 text-sm leading-relaxed"></p>
          </div>
        </div>

        <!-- 良い点 -->
        <div id="good-points-section" class="mb-6 hidden fade-in">
          <div class="bg-swing-card rounded-xl p-5 border border-swing-border">
            <h3 class="text-base font-bold text-white mb-3 flex items-center gap-2">
              <span class="text-swing-green">✅</span> 良い点
            </h3>
            <ul id="good-points-list" class="space-y-2"></ul>
          </div>
        </div>

        <!-- 改善点 -->
        <div id="improvements-section" class="mb-6 hidden fade-in">
          <div class="bg-swing-card rounded-xl p-5 border border-swing-border">
            <h3 class="text-base font-bold text-white mb-3 flex items-center gap-2">
              <span class="text-yellow-400">⚡</span> 改善ポイント
            </h3>
            <ul id="improvements-list" class="space-y-2"></ul>
          </div>
        </div>

        <!-- もう一度解析ボタン -->
        <button id="retry-btn" class="w-full py-3 rounded-xl border border-swing-border text-gray-300 font-medium text-sm hover:bg-swing-card transition mt-4 hidden">
          🔄 別の動画を解析する
        </button>
      </section>

      <!-- フィーチャーバッジ -->
      <section class="flex flex-wrap justify-center gap-2 mt-8">
        <span class="px-3 py-1.5 rounded-full bg-swing-card border border-swing-border text-xs text-gray-400">🦴 骨格検出</span>
        <span class="px-3 py-1.5 rounded-full bg-swing-card border border-swing-border text-xs text-gray-400">🏹 軌道描画</span>
        <span class="px-3 py-1.5 rounded-full bg-swing-card border border-swing-border text-xs text-gray-400">💯 100点採点</span>
        <span class="px-3 py-1.5 rounded-full bg-swing-card border border-swing-border text-xs text-gray-400">🎬 練習動画付き</span>
      </section>
    </main>
  </div>

  <script>
    // DOM要素
    const fileInput = document.getElementById('file-input');
    const uploadZone = document.getElementById('upload-zone');
    const uploadPlaceholder = document.getElementById('upload-placeholder');
    const previewSection = document.getElementById('preview-section');
    const videoPreviewContainer = document.getElementById('video-preview-container');
    const videoPreview = document.getElementById('video-preview');
    const imagePreviewContainer = document.getElementById('image-preview-container');
    const imagePreview = document.getElementById('image-preview');
    const fileName = document.getElementById('file-name');
    const removeBtn = document.getElementById('remove-btn');
    const analyzeBtn = document.getElementById('analyze-btn');
    const progressSection = document.getElementById('progress-section');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    const progressPercent = document.getElementById('progress-percent');
    const resultSection = document.getElementById('result-section');
    const analyzedVideoSection = document.getElementById('analyzed-video-section');
    const analyzedVideo = document.getElementById('analyzed-video');
    const scoreValue = document.getElementById('score-value');
    const scoreLabel = document.getElementById('score-label');
    const summarySection = document.getElementById('summary-section');
    const summaryText = document.getElementById('summary-text');
    const goodPointsSection = document.getElementById('good-points-section');
    const goodPointsList = document.getElementById('good-points-list');
    const improvementsSection = document.getElementById('improvements-section');
    const improvementsList = document.getElementById('improvements-list');
    const retryBtn = document.getElementById('retry-btn');
    const scoreSection = document.getElementById('score-section');

    let selectedFile = null;

    // ドラッグ&ドロップ
    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('drag-over');
    });
    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('drag-over');
    });
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        handleFile(files[0]);
      }
    });

    // ファイル選択
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFile(e.target.files[0]);
      }
    });

    // ファイル処理
    function handleFile(file) {
      const allowedTypes = ['video/mp4', 'video/quicktime', 'image/jpeg', 'image/png'];
      if (!allowedTypes.includes(file.type)) {
        alert('対応していないファイル形式です。MP4, MOV, JPG, PNG のいずれかを選択してください。');
        return;
      }
      if (file.size > 50 * 1024 * 1024) {
        alert('ファイルサイズが大きすぎます（最大50MB）');
        return;
      }

      selectedFile = file;
      fileName.textContent = file.name;
      previewSection.classList.remove('hidden');
      analyzeBtn.disabled = false;

      // プレビュー表示
      if (file.type.startsWith('video/')) {
        videoPreviewContainer.classList.remove('hidden');
        imagePreviewContainer.classList.add('hidden');
        videoPreview.src = URL.createObjectURL(file);
      } else {
        imagePreviewContainer.classList.remove('hidden');
        videoPreviewContainer.classList.add('hidden');
        imagePreview.src = URL.createObjectURL(file);
      }

      // 結果セクションを非表示
      resultSection.classList.add('hidden');
    }

    // ファイル削除
    removeBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      resetUpload();
    });

    function resetUpload() {
      selectedFile = null;
      fileInput.value = '';
      previewSection.classList.add('hidden');
      videoPreviewContainer.classList.add('hidden');
      imagePreviewContainer.classList.add('hidden');
      analyzeBtn.disabled = true;
      resultSection.classList.add('hidden');
      progressSection.classList.add('hidden');
    }

    // 解析実行
    analyzeBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      // UI更新
      analyzeBtn.disabled = true;
      analyzeBtn.textContent = '⏳ 解析中...';
      progressSection.classList.remove('hidden');
      resultSection.classList.add('hidden');

      // プログレスアニメーション
      let progress = 0;
      const progressInterval = setInterval(() => {
        progress += Math.random() * 8;
        if (progress > 90) progress = 90;
        updateProgress(progress, '解析中...');
      }, 500);

      try {
        const formData = new FormData();
        formData.append('file', selectedFile);

        const response = await fetch('/api/analyze', {
          method: 'POST',
          body: formData,
        });

        clearInterval(progressInterval);

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.error || `サーバーエラー (${response.status})`);
        }

        updateProgress(100, '完了！');

        const data = await response.json();
        console.log('Response:', data);

        // 結果表示
        setTimeout(() => {
          progressSection.classList.add('hidden');
          displayResults(data);
        }, 500);

      } catch (error) {
        clearInterval(progressInterval);
        progressSection.classList.add('hidden');
        alert('⚠️ ' + (error.message || 'エラーが発生しました'));
        console.error('Analysis error:', error);
      } finally {
        analyzeBtn.disabled = false;
        analyzeBtn.textContent = '🏌️ スイングを解析する';
      }
    });

    function updateProgress(percent, text) {
      progressBar.style.width = percent + '%';
      progressPercent.textContent = Math.round(percent) + '%';
      if (text) progressText.textContent = text;
    }

    // 結果表示
    function displayResults(data) {
      resultSection.classList.remove('hidden');

      // レスポンス形式に対応（result ラッパーがある場合とない場合）
      const result = data.result || data;
      const analysis = result.analysis || {};

      // スコア
      const score = analysis.score || 0;
      scoreValue.textContent = score;
      scoreSection.classList.remove('hidden');
      
      // スコアサークルのアニメーション
      const scoreCircle = document.querySelector('.score-circle');
      scoreCircle.style.setProperty('--score', score);

      // スコアラベル
      if (score >= 80) {
        scoreLabel.textContent = '素晴らしいスイングです！';
        scoreLabel.className = 'text-swing-green text-sm font-medium';
      } else if (score >= 60) {
        scoreLabel.textContent = '良いスイングですが、改善の余地があります';
        scoreLabel.className = 'text-yellow-400 text-sm font-medium';
      } else {
        scoreLabel.textContent = '基礎から見直しましょう';
        scoreLabel.className = 'text-orange-400 text-sm font-medium';
      }

      // サマリー
      if (analysis.summary) {
        summarySection.classList.remove('hidden');
        summaryText.textContent = analysis.summary;
      }

      // 良い点
      const goodPoints = analysis.good_points || [];
      if (goodPoints.length > 0) {
        goodPointsSection.classList.remove('hidden');
        goodPointsList.innerHTML = goodPoints.map(point => 
          `<li class="flex items-start gap-2 text-sm text-gray-300">
            <span class="text-swing-green mt-0.5 flex-shrink-0">●</span>
            <span>${escapeHtml(point)}</span>
          </li>`
        ).join('');
      }

      // 改善点
      const improvements = analysis.improvements || [];
      if (improvements.length > 0) {
        improvementsSection.classList.remove('hidden');
        improvementsList.innerHTML = improvements.map(point => 
          `<li class="flex items-start gap-2 text-sm text-gray-300">
            <span class="text-yellow-400 mt-0.5 flex-shrink-0">▶</span>
            <span>${escapeHtml(point)}</span>
          </li>`
        ).join('');
      }

      // 解析済み動画
      const videoUrl = result.video_url;
      if (videoUrl) {
        analyzedVideoSection.classList.remove('hidden');
        analyzedVideo.src = videoUrl;
      }

      // もう一度ボタン
      retryBtn.classList.remove('hidden');
    }

    // もう一度解析
    retryBtn.addEventListener('click', () => {
      resetUpload();
      retryBtn.classList.add('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // XSS対策
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
