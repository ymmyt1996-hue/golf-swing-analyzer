<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWING AI - ゴルフスイング解析</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; font-family: 'Noto Sans JP', sans-serif; background: radial-gradient(ellipse at 20% 50%, #0d2b0d, #0a0f0a 50%, #0a1a1a); color: #e8f0e8; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(74,180,74,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(74,180,74,0.04) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  header { position: relative; z-index: 10; border-bottom: 1px solid rgba(74,180,74,0.15); background: rgba(10,15,10,0.85); backdrop-filter: blur(12px); padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  .logo-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 4px; color: #4ab44a; }
  .logo-sub { font-size: 10px; color: #5a7a5a; letter-spacing: 2px; }
  main { position: relative; z-index: 10; max-width: 600px; margin: 0 auto; padding: 32px 20px 60px; }
  .headline { text-align: center; margin-bottom: 32px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 40px; line-height: 1.15; letter-spacing: 2px; background: linear-gradient(135deg, #7fff7f, #4ab44a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; }
  .subtext { font-size: 14px; color: #6a8a6a; line-height: 1.7; }
  .upload-label { display: block; border: 2px dashed rgba(74,180,74,0.35); border-radius: 20px; padding: 48px 24px; text-align: center; cursor: pointer; background: rgba(74,180,74,0.03); transition: all 0.25s; margin-bottom: 20px; }
  .upload-label:hover, .upload-label:active { border-color: #4ab44a; background: rgba(74,180,74,0.08); }
  .upload-label input { display: none; }
  .drop-icon { font-size: 48px; margin-bottom: 16px; }
  .drop-title { font-size: 18px; font-weight: 700; color: #c8e8c8; margin-bottom: 8px; }
  .drop-hint { font-size: 13px; color: #5a7a5a; margin-bottom: 12px; }
  .drop-formats { display: inline-block; font-size: 11px; color: #4ab44a; background: rgba(74,180,74,0.1); padding: 4px 12px; border-radius: 20px; }
  #preview-wrap { display: none; border-radius: 16px; overflow: hidden; border: 1px solid rgba(74,180,74,0.2); background: rgba(0,0,0,0.3); margin-bottom: 20px; }
  #preview-wrap img, #preview-wrap video { width: 100%; max-height: 320px; object-fit: cover; display: block; }
  .preview-info { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; }
  .preview-name { font-size: 13px; color: #6a8a6a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%; }
  .remove-btn { background: rgba(255,80,80,0.15); border: 1px solid rgba(255,80,80,0.3); color: #ff8080; border-radius: 8px; padding: 4px 12px; font-size: 12px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
  .error-box { display: none; background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3); color: #ff9090; border-radius: 12px; padding: 12px 16px; font-size: 14px; margin-bottom: 16px; }
  .analyze-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #2d7a2d, #4ab44a); border: none; border-radius: 16px; color: #fff; font-size: 18px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; letter-spacing: 1px; box-shadow: 0 8px 32px rgba(74,180,74,0.3); transition: all 0.2s; margin-bottom: 24px; }
  .analyze-btn:disabled { background: rgba(74,180,74,0.15); box-shadow: none; cursor: not-allowed; color: #4a6a4a; }
  .features { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .feature-chip { font-size: 12px; color: #4ab44a; background: rgba(74,180,74,0.08); border: 1px solid rgba(74,180,74,0.2); padding: 6px 14px; border-radius: 20px; }
  #result-section { display: none; overflow-y: auto; }
  .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .result-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 3px; color: #4ab44a; }
  .retry-btn { background: rgba(74,180,74,0.1); border: 1px solid rgba(74,180,74,0.3); color: #4ab44a; border-radius: 10px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
  .thumb-wrap { border-radius: 16px; overflow: hidden; border: 1px solid rgba(74,180,74,0.2); margin-bottom: 20px; }
  .thumb-wrap img { width: 100%; max-height: 240px; object-fit: cover; display: block; }
  .analysis-card { background: rgba(74,180,74,0.04); border: 1px solid rgba(74,180,74,0.15); border-radius: 20px; padding: 24px 20px; margin-bottom: 24px; }
  .analysis-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: #4ab44a; margin: 16px 0 8px; border-bottom: 1px solid rgba(74,180,74,0.2); padding-bottom: 6px; }
  .analysis-card p { font-size: 14px; color: #a8c8a8; line-height: 1.8; margin-bottom: 6px; word-break: break-all; white-space: pre-wrap; overflow-wrap: anywhere; }
  .analysis-card .bullet { padding-left: 8px; border-left: 2px solid rgba(74,180,74,0.3); }
  .analysis-card strong { color: #c8e8c8; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 10px; }
  .free-badge { text-align: center; font-size: 11px; color: #4ab44a; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<header>
  <span style="font-size:28px">⛳</span>
  <div>
    <div class="logo-title">SWING AI</div>
    <div class="logo-sub">Golf Swing Analyzer</div>
  </div>
</header>
<main>
  <div id="upload-section">
    <div class="headline">
      <h1>あなたのスイングを<br>AIが解析します</h1>
      <p class="subtext">動画または画像をアップロードするだけで<br>プロコーチ級のアドバイスを即座に提供</p>
    </div>
    <div class="free-badge">✨ 完全無料・登録不要</div>
    <label class="upload-label">
      <input type="file" id="file-input" accept="image/*,video/*">
      <div class="drop-icon">📱</div>
      <p class="drop-title">タップして動画・画像を選択</p>
      <p class="drop-hint">カメラロールから選択または直接撮影</p>
      <span class="drop-formats">MP4 / MOV / JPG / PNG 対応</span>
    </label>
    <div id="preview-wrap">
      <div id="preview-media"></div>
      <div class="preview-info">
        <span class="preview-name" id="preview-name"></span>
        <button class="remove-btn" onclick="resetFile()">✕ 削除</button>
      </div>
    </div>
    <div class="error-box" id="error-box"></div>
    <button class="analyze-btn" id="analyze-btn" disabled onclick="analyze()">🏌️ スイングを解析する</button>
    <div class="features">
      <span class="feature-chip">📐 フォーム分析</span>
      <span class="feature-chip">🎯 改善ポイント指摘</span>
      <span class="feature-chip">💪 練習ドリル提案</span>
    </div>
  </div>
  <div id="result-section">
    <div class="result-header">
      <h2 class="result-title">解析結果</h2>
      <button class="retry-btn" onclick="resetAll()">🔄 もう一度</button>
    </div>
    <div class="thumb-wrap" id="result-thumb"></div>
    <div class="analysis-card" id="analysis-card"></div>
    <button class="analyze-btn" onclick="resetAll()">🏌️ 別のスイングを解析</button>
  </div>
</main>
<script>
let currentFile = null;
let previewObjectUrl = null;

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) handleFile(file);
});

function handleFile(file) {
  const isImage = file.type.startsWith('image/');
  const isVideo = file.type.startsWith('video/');
  if (!isImage && !isVideo) { showError('画像または動画ファイルを選択してください'); return; }
  currentFile = file;
  hideError();
  if (previewObjectUrl) URL.revokeObjectURL(previewObjectUrl);
  previewObjectUrl = URL.createObjectURL(file);
  const mediaDiv = document.getElementById('preview-media');
  mediaDiv.innerHTML = isVideo
    ? `<video src="${previewObjectUrl}" controls playsinline style="width:100%;max-height:320px;object-fit:cover;display:block"></video>`
    : `<img src="${previewObjectUrl}" alt="スイング" style="width:100%;max-height:320px;object-fit:cover;display:block">`;
  document.getElementById('preview-name').textContent = file.name;
  document.getElementById('preview-wrap').style.display = 'block';
  document.getElementById('analyze-btn').disabled = false;
}

function resetFile() {
  currentFile = null;
  if (previewObjectUrl) { URL.revokeObjectURL(previewObjectUrl); previewObjectUrl = null; }
  document.getElementById('preview-wrap').style.display = 'none';
  document.getElementById('preview-media').innerHTML = '';
  document.getElementById('file-input').value = '';
  document.getElementById('analyze-btn').disabled = true;
  hideError();
}

function resetAll() {
  resetFile();
  document.getElementById('upload-section').style.display = 'block';
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('analysis-card').innerHTML = '';
  document.getElementById('result-thumb').innerHTML = '';
}

async function analyze() {
  if (!currentFile) return;
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>AIが解析中...';
  hideError();

  let fileToSend = currentFile;
  if (currentFile.type.startsWith('video/')) {
    try { fileToSend = await extractVideoFrame(currentFile); } catch(e) {}
  }

  const formData = new FormData();
  formData.append('file', fileToSend);

  try {
    const res = await fetch('/api/analyze', { method: 'POST', body: formData });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '解析に失敗しました');

    document.getElementById('upload-section').style.display = 'none';
    const resultSection = document.getElementById('result-section');
    resultSection.style.display = 'block';
    resultSection.style.animation = 'fadeUp 0.4s ease';

    const img = document.querySelector('#preview-media img');
    if (img) document.getElementById('result-thumb').innerHTML = `<img src="${img.src}" alt="スイング">`;

    document.getElementById('analysis-card').innerHTML = renderAnalysis(data.result);
  } catch (err) {
    showError(err.message);
    btn.disabled = false;
    btn.innerHTML = '🏌️ スイングを解析する';
  }
}

function extractVideoFrame(videoFile) {
  return new Promise((resolve, reject) => {
    const video = document.createElement('video');
    const url = URL.createObjectURL(videoFile);
    video.src = url; video.muted = true;
    video.addEventListener('loadeddata', () => { video.currentTime = Math.min(1.0, video.duration * 0.25); });
    video.addEventListener('seeked', () => {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth || 640; canvas.height = video.videoHeight || 360;
      canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob => resolve(new File([blob], 'frame.jpg', { type: 'image/jpeg' })), 'image/jpeg', 0.85);
    });
    video.addEventListener('error', () => { URL.revokeObjectURL(url); reject(); });
    video.load();
  });
}

function renderAnalysis(text) {
  return text.split('\n').map(line => {
    line = line.trim();
    if (!line) return '<div style="height:8px"></div>';
    if (/^#{1,3}\s/.test(line)) return `<h3>${line.replace(/^#+\s/, '')}</h3>`;
    line = line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    if (line.startsWith('- ') || line.startsWith('・') || line.startsWith('• ')) return `<p class="bullet">${line}</p>`;
    return `<p>${line}</p>`;
  }).join('');
}

function showError(msg) { const el = document.getElementById('error-box'); el.textContent = '⚠️ ' + msg; el.style.display = 'block'; }
function hideError() { document.getElementById('error-box').style.display = 'none'; }
</script>
</body>
</html>
